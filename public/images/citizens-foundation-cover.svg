<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142433"/>
      <stop offset="100%" stop-color="#1E6F5C"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B3548"/>
      <stop offset="100%" stop-color="#16406A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- faint connective network representing convergence with departments -->
  <g stroke="#F2F4F3" stroke-width="1.4" opacity="0.18">
    <line x1="120" y1="140" x2="300" y2="90"/>
    <line x1="300" y1="90" x2="520" y2="150"/>
    <line x1="520" y1="150" x2="760" y2="80"/>
    <line x1="760" y1="80" x2="980" y2="130"/>
    <line x1="300" y1="90" x2="520" y2="60"/>
    <line x1="760" y1="80" x2="900" y2="40"/>
  </g>
  <g fill="#D98D1B">
    <circle cx="120" cy="140" r="5"/>
    <circle cx="300" cy="90" r="4"/>
    <circle cx="520" cy="150" r="5"/>
    <circle cx="520" cy="60" r="4"/>
    <circle cx="760" cy="80" r="5"/>
    <circle cx="980" cy="130" r="4"/>
    <circle cx="900" cy="40" r="4"/>
  </g>

  <!-- distant hill range -->
  <path d="M0,430 C150,360 300,410 450,370 C600,330 750,390 900,350 C1000,325 1100,360 1200,340 L1200,675 L0,675 Z" fill="url(#hillFar)" opacity="0.55"/>

  <!-- nearer hill range -->
  <path d="M0,500 C180,430 340,480 500,440 C650,405 800,460 960,420 C1050,398 1130,430 1200,415 L1200,675 L0,675 Z" fill="#0F2A38" opacity="0.75"/>

  <!-- foreground terrain -->
  <path d="M0,560 C200,520 380,570 560,540 C740,510 900,555 1080,530 C1130,523 1170,530 1200,525 L1200,675 L0,675 Z" fill="#0A1F2A"/>

  <!-- small rural houses along the ridge -->
  <g fill="#F2F4F3" opacity="0.85">
    <g transform="translate(230,505)">
      <rect x="0" y="10" width="34" height="22" />
      <polygon points="-4,10 17,-8 38,10"/>
    </g>
    <g transform="translate(430,478)">
      <rect x="0" y="10" width="30" height="20" />
      <polygon points="-3,10 15,-7 33,10"/>
    </g>
    <g transform="translate(650,500)">
      <rect x="0" y="10" width="34" height="22" />
      <polygon points="-4,10 17,-8 38,10"/>
    </g>
    <g transform="translate(880,480)">
      <rect x="0" y="10" width="30" height="20" />
      <polygon points="-3,10 15,-7 33,10"/>
    </g>
  </g>

  <!-- ticker-style location tag, consistent with site motif -->
  <text x="60" y="600" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#D98D1B" letter-spacing="1">
    $BUILD
  </text>
  <text x="60" y="630" font-family="JetBrains Mono, monospace" font-size="15" fill="#F2F4F3" opacity="0.75" letter-spacing="0.5">
    SAGALEE · PAPUM PARE · ARUNACHAL PRADESH
  </text>
</svg>
