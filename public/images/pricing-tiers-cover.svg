<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#0B0B0C"/>

  <!-- subtle grid texture -->
  <g stroke="#1E1E21" stroke-width="1">
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="337" x2="1200" y2="337"/>
    <line x1="0" y1="506" x2="1200" y2="506"/>
  </g>

  <!-- three ascending bars representing pricing tiers -->
  <g>
    <rect x="300" y="430" width="150" height="150" rx="8" fill="#111113" stroke="#1E1E21"/>
    <text x="375" y="470" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8A8A90" text-anchor="middle" font-weight="600">STARTER</text>
    <text x="375" y="545" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#EDEDEF" text-anchor="middle" font-weight="800">Tier 1</text>

    <rect x="480" y="330" width="150" height="250" rx="8" fill="#111113" stroke="#2B6FFF" stroke-width="2"/>
    <text x="555" y="370" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#2B6FFF" text-anchor="middle" font-weight="700">CORE MVP</text>
    <text x="555" y="470" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="800">Tier 2</text>

    <rect x="660" y="230" width="150" height="350" rx="8" fill="#111113" stroke="#1E1E21"/>
    <text x="735" y="270" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8A8A90" text-anchor="middle" font-weight="600">FULL BUILD</text>
    <text x="735" y="415" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#EDEDEF" text-anchor="middle" font-weight="800">Tier 3</text>
  </g>

  <text x="60" y="80" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#2B6FFF" font-weight="700" letter-spacing="1">$CAP</text>
  <text x="60" y="115" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#FFFFFF" font-weight="800">Pricing a Freelance SaaS MVP</text>
</svg>
