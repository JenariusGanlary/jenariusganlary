<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="500" fill="#F2F4F3"/>

  <text x="500" y="55" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#142433" text-anchor="middle">
    Where systems actually break
  </text>

  <!-- pipeline stages -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#52796F">
    <text x="130" y="120" text-anchor="middle">DESIGN</text>
    <text x="370" y="120" text-anchor="middle">DATA ENTRY</text>
    <text x="620" y="120" text-anchor="middle">PROCESSING</text>
    <text x="870" y="120" text-anchor="middle">REPORTING</text>
  </g>

  <!-- pipeline bar -->
  <rect x="60" y="150" width="140" height="60" rx="8" fill="#1E6F5C"/>
  <rect x="300" y="150" width="140" height="60" rx="8" fill="#D98D1B"/>
  <rect x="550" y="150" width="140" height="60" rx="8" fill="#1E6F5C"/>
  <rect x="800" y="150" width="140" height="60" rx="8" fill="#1E6F5C"/>

  <line x1="200" y1="180" x2="300" y2="180" stroke="#94A3A0" stroke-width="3"/>
  <line x1="440" y1="180" x2="550" y2="180" stroke="#94A3A0" stroke-width="3"/>
  <line x1="690" y1="180" x2="800" y2="180" stroke="#94A3A0" stroke-width="3"/>

  <!-- highlight on data entry -->
  <path d="M370,220 L370,270" stroke="#D98D1B" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="370" y="300" font-family="Inter, sans-serif" font-size="15" fill="#142433" text-anchor="middle" font-weight="600">
    Where a tired human
  </text>
  <text x="370" y="322" font-family="Inter, sans-serif" font-size="15" fill="#142433" text-anchor="middle" font-weight="600">
    fills the form
  </text>
  <text x="370" y="352" font-family="Inter, sans-serif" font-size="14" fill="#52796F" text-anchor="middle">
    → the failure almost always
  </text>
  <text x="370" y="372" font-family="Inter, sans-serif" font-size="14" fill="#52796F" text-anchor="middle">
    starts here, not downstream
  </text>

  <text x="500" y="460" font-family="JetBrains Mono, monospace" font-size="13" fill="#94A3A0" text-anchor="middle">
    a field MIS and a SaaS onboarding form fail the same way
  </text>
</svg>
