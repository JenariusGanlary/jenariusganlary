<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142433"/>
      <stop offset="100%" stop-color="#2B6FFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- left icon: laptop / IT -->
  <g transform="translate(230,300)" fill="#FFFFFF">
    <rect x="-60" y="-35" width="120" height="75" rx="6" opacity="0.95"/>
    <rect x="-50" y="-25" width="100" height="55" rx="3" fill="#142433"/>
    <rect x="-70" y="40" width="140" height="10" rx="3" opacity="0.95"/>
  </g>
  <text x="230" y="400" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="700" opacity="0.9">IT SECTOR</text>

  <!-- right icon: hills / community -->
  <g transform="translate(970,300)" fill="#FFFFFF" opacity="0.95">
    <path d="M -90 40 L -40 -30 L 0 10 L 50 -50 L 90 40 Z"/>
    <circle cx="55" cy="-70" r="16"/>
  </g>
  <text x="970" y="400" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="700" opacity="0.9">RURAL LIVELIHOODS</text>

  <!-- connecting bridge/road -->
  <path d="M 330 340 Q 600 260 870 340" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-dasharray="10,10" opacity="0.6"/>

  <text x="60" y="80" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFFFFF" font-weight="800" letter-spacing="1" opacity="0.9">$BUILD</text>
  <text x="60" y="130" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="800">From IT Sector to Rural</text>
  <text x="60" y="168" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="800">Livelihoods — A Mindset Shift</text>
</svg>
