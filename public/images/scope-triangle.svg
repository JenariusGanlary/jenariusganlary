<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="600" fill="#F3F5F7"/>

  <text x="450" y="60" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#0B0B0C" text-anchor="middle" font-weight="800">Pick Two</text>
  <text x="450" y="88" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#6B6B73" text-anchor="middle">The trade-off every fixed-price quote has to make explicit</text>

  <!-- triangle -->
  <polygon points="450,140 250,480 650,480" fill="none" stroke="#2B6FFF" stroke-width="3"/>

  <!-- top vertex: FAST -->
  <circle cx="450" cy="140" r="8" fill="#2B6FFF"/>
  <text x="450" y="115" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0B0B0C" text-anchor="middle" font-weight="800">FAST</text>

  <!-- bottom left: CHEAP -->
  <circle cx="250" cy="480" r="8" fill="#2B6FFF"/>
  <text x="220" y="520" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0B0B0C" text-anchor="middle" font-weight="800">CHEAP</text>

  <!-- bottom right: GOOD -->
  <circle cx="650" cy="480" r="8" fill="#2B6FFF"/>
  <text x="680" y="520" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0B0B0C" text-anchor="middle" font-weight="800">GOOD</text>

  <text x="450" y="570" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B6B73" text-anchor="middle">A client asking for all three at once is the single biggest red flag in scoping a project.</text>
</svg>
